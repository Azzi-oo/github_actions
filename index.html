<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторная 3 — GitHub Pages</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            max-width: 720px;
            margin: 4rem auto;
            padding: 0 1rem;
            line-height: 1.6;
            color: #222;
        }
        h1 { color: #0366d6; }
        code {
            background: #f6f8fa;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }
        .badge {
            display: inline-block;
            background: #2ea44f;
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.85em;
        }
    </style>
</head>
<body>
    <h1>Лабораторная работа №3</h1>
    <p class="badge">Deployed via GitHub Actions</p>
    <h2>Автоматический деплой статического сайта</h2>
    <p>
        Этот сайт развёрнут на GitHub Pages с помощью GitHub Actions
        и action <code>peaceiris/actions-gh-pages</code>.
    </p>
    <p>
        Любой пуш в ветку <code>main</code> автоматически пересобирает
        и публикует сайт в ветке <code>gh-pages</code>.
    </p>
    <hr>
    <p><small>Build: <span id="ts"></span></small></p>
    <script>
        document.getElementById("ts").textContent = new Date().toISOString();
    </script>
</body>
</html>
